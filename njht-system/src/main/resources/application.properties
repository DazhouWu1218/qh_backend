
server.port=7002
spring.application.name=njht-system
server.max-http-header-size=65546

#eureka.client.serviceUrl.defaultZone=http://10.181.22.194:7001/eureka
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7001/eureka
#
eureka.instance.prefer-ip-address=true
#zuul.routes.user.path=/aa/**
zuul.routes.imb-service=/imb-service/**

#zuul.routes.system-resources.path=/res/**
#zuul.routes.system-resources.url=http://localhost:8002/res/
instance:
prefer-ip-address: true
token.expiration.Time=1800

#配置redis
spring.session.store-type=redis
#spring.redis.host=127.0.0.1
spring.redis.host=10.181.22.247
spring.redis.port=6379
spring.redis.timeout.seconds=30000

server.servlet.session.cookie.sameSite=
server.servlet.session.cookie.path=/
server.servlet.session.cookie.name=SESSION
server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.use-base64-encoding=false
heartbeat.interval=60
log.behavior.enabled=true
token.authPath.exclude=/system/menu/tree/visitor,/doc.*,/sys/dic/**,/system/orgs/getOrgByCode,/system/user/getUserIdList,\
  /system/user/getUserIdList,/system/role/getUsersByRoleId,/system/role/getAllRoles,/system/fun/add,\
  /system-service/res/**,/system/user/getSecurityUser,/system/random/image,/heartbeat,/swagger-ui.html,\
  /**/swagger-ui.html,/webjars/**,/v2/**,/swagger-resources/**,/system/orgs/export,/favicon.ico

# \u8FC7\u6EE4\u5668\u6253\u5370\u65E5\u5FD7 \u6392\u9664\u8DEF\u5F84

log.path.exclude=/system-service/res/**,/report/download/**

#统一平台的后台 与 与单个公用一套，这里是标识
chooseUnitPaltForm=true

ribbon.ReadTimeout=60000
ribbon.ConnectTimeout=60000
ribbon.eager-load.enabled=true
file.rootPath=D:/mips

xssParam.splitChar: @
xssParam.filterChar: >@<@\'@\"@\\@#@(@)
xssParam.replaceChar: \uFF1E\u2019@\uFF1C@\u2018@\u201C@\uFF3C@\uFF03@\uFF08@\uFF09

